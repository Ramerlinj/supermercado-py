services:
  - type: web
    name: supermercado-py
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn index:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.3
